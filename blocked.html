<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Protected by PureShield</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0b0e1a;
      color: #e8eaf6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }
    
    /* Background glow effect */
    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(79,114,255,0.05) 0%, rgba(11,14,26,0) 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      max-width: 520px;
      width: 100%;
      text-align: center;
      background: #111527;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px;
      padding: 56px 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .shield-wrap {
      width: 80px; height: 80px;
      background: rgba(76,166,38,0.1);
      border: 1px solid rgba(76,166,38,0.25);
      border-radius: 50%;
      margin: 0 auto 32px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    
    .shield-wrap::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid rgba(76,166,38,0.15);
      animation: pulse 2.5s infinite ease-out;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.4); opacity: 0; }
    }

    .shield-wrap svg { width: 36px; height: 36px; color: #4ca626; }
    
    h1 { 
      font-size: 26px; 
      font-weight: 800; 
      color: #fff; 
      margin-bottom: 24px; 
      letter-spacing: -0.5px; 
      line-height: 1.2;
    }

    .quote-box {
      background: rgba(255,255,255,0.03);
      border-left: 3px solid #4f72ff;
      padding: 18px 24px;
      border-radius: 0 12px 12px 0;
      margin-bottom: 32px;
      text-align: left;
    }

    .quote-text {
      font-size: 15px;
      line-height: 1.6;
      color: #dde1f5;
      font-weight: 500;
      font-style: italic;
      margin-bottom: 10px;
    }

    .quote-source {
      font-size: 12px;
      color: #5b81ff;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .msg {
      font-size: 14px;
      line-height: 1.6;
      color: #8b95a5;
      margin-bottom: 32px;
    }



    .btn {
      display: inline-block;
      padding: 12px 28px;
      background: #fff;
      color: #0b0e1a;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s, background 0.2s;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: #e8eaf6;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <div class="shield-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <polyline points="9 12 11 14 15 10"/>
      </svg>
    </div>
    
    <h1>Take a moment to reflect.</h1>
    
    <div class="quote-box">
      <div class="quote-text">"And Allah knows what you conceal and what you reveal."</div>
      <div class="quote-source">— Quran 16:19</div>
    </div>
    
    <div class="msg">
      This site was blocked because it contains adult or harmful content.<br><br>
      Close this tab and protect your heart. True peace is found in the remembrance of Allah.
    </div>
    
    <button class="btn" id="closeBtn">Close Tab</button>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
